- name: Check whether pixi is already installed on PATH
  ansible.builtin.command: bash -lc 'command -v pixi'
  register: pixi_command
  changed_when: false
  failed_when: false

- name: Check whether pixi exists in the default local install directory
  ansible.builtin.stat:
    path: "{{ pixi_install_dir }}/pixi"
  register: pixi_local_binary

- name: Validate supported architecture for pixi install
  ansible.builtin.assert:
    that:
      - ansible_facts.architecture == "x86_64"
    fail_msg: >-
      Unsupported architecture for pixi installation: {{ ansible_facts.architecture }}
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Set pixi download parameters
  ansible.builtin.set_fact:
    pixi_base_url: https://github.com/prefix-dev/pixi/releases/download/v{{ pixi_version }}
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Ensure pixi install directory exists
  ansible.builtin.file:
    path: "{{ pixi_install_dir }}"
    state: directory
    mode: "0755"
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Download pixi release artifact
  ansible.builtin.get_url:
    url: "{{ pixi_base_url }}/{{ pixi_archive }}"
    dest: /tmp/{{ pixi_archive }}
    mode: "0644"
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Download pixi release checksum
  ansible.builtin.get_url:
    url: "{{ pixi_base_url }}/{{ pixi_archive }}.sha256"
    dest: /tmp/{{ pixi_archive }}.sha256
    mode: "0644"
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Read pixi release checksum
  ansible.builtin.slurp:
    src: /tmp/{{ pixi_archive }}.sha256
  register: pixi_checksum_file
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Verify downloaded pixi release checksum
  ansible.builtin.stat:
    path: /tmp/{{ pixi_archive }}
    checksum_algorithm: sha256
  register: pixi_downloaded_archive
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Assert downloaded pixi archive matches release checksum
  ansible.builtin.assert:
    that:
      - pixi_downloaded_archive.stat.checksum == expected_pixi_checksum
    fail_msg: pixi archive checksum verification failed after download.
  vars:
    expected_pixi_checksum: >-
      {{ (pixi_checksum_file.content | b64decode).split()[0] }}
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Unpack pixi release artifact
  ansible.builtin.unarchive:
    src: /tmp/{{ pixi_archive }}
    dest: "{{ pixi_install_dir }}"
    remote_src: true
    include:
      - pixi
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Remove pixi installer artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/{{ pixi_archive }}
    - /tmp/{{ pixi_archive }}.sha256
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Ensure pixi binary directory is added to Bash PATH
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    create: true
    mode: "0644"
    marker: "# {mark} AUTOWARE-ML PIXI PATH"
    block: |
      export PATH="$HOME/.pixi/bin:$PATH"
  when:
    - pixi_command.rc != 0
    - not pixi_local_binary.stat.exists

- name: Display pixi installation status
  ansible.builtin.debug:
    msg: >-
      pixi is available. Start a new shell session so the ~/.bashrc PATH
      update is applied if this was a fresh installation.
