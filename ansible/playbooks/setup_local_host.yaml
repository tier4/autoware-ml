- name: Setup Autoware-ML Local Development Environment
  hosts: localhost
  become: false

  tasks:
    - name: Introduction
      ansible.builtin.debug:
        msg: >-
          This playbook sets up the local Autoware-ML development environment.
          You will be prompted before each optional step.

    - name: Install local shell prerequisites
      become: true
      ansible.builtin.apt:
        name:
          - bash-completion
          - curl
        state: present
        update_cache: true

    - name: Check whether pixi is already installed on PATH
      ansible.builtin.command: bash -lc 'command -v pixi'
      register: pixi_command
      changed_when: false
      failed_when: false

    - name: Check whether pixi exists in the default local install directory
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.pixi/bin/pixi"
      register: pixi_local_binary

    - name: Ask to install pixi
      ansible.builtin.pause:
        prompt: Do you want to install pixi? (y/n)
      register: pixi_response
      when:
        - pixi_command.rc != 0
        - not pixi_local_binary.stat.exists

    - name: Include pixi role
      ansible.builtin.include_role:
        name: pixi
      when:
        - pixi_command.rc != 0
        - not pixi_local_binary.stat.exists
        - pixi_response.user_input | default('n') | lower == 'y'

    - name: Warn when pixi is missing and installation was skipped
      ansible.builtin.debug:
        msg: >-
          pixi is still missing. Install it manually before running local
          Autoware-ML setup commands.
      when:
        - pixi_command.rc != 0
        - not pixi_local_binary.stat.exists
        - pixi_response.user_input | default('n') | lower != 'y'

    - name: Ask to install NVIDIA drivers
      ansible.builtin.pause:
        prompt: Do you want to check and install NVIDIA drivers? (y/n)
      register: nvidia_response

    - name: Include nvidia role
      ansible.builtin.include_role:
        name: nvidia
      when: nvidia_response.user_input | default('n') | lower == 'y'

    - name: Ask to install NVIDIA CUDA Toolkit
      ansible.builtin.pause:
        prompt: Do you want to install the NVIDIA CUDA Toolkit? (y/n)
      register: cuda_toolkit_response

    - name: Include nvidia_cuda_toolkit role
      ansible.builtin.include_role:
        name: nvidia_cuda_toolkit
      when: cuda_toolkit_response.user_input | default('n') | lower == 'y'

    - name: Ask to install VS Code
      ansible.builtin.pause:
        prompt: Do you want to install VS Code and extensions? (y/n)
      register: vscode_response

    - name: Include vscode role
      ansible.builtin.include_role:
        name: vscode
      when: vscode_response.user_input | default('n') | lower == 'y'

    - name: Setup completed
      ansible.builtin.debug:
        msg: >-
          Local development environment setup completed. You may need to reboot
          your system for NVIDIA driver changes to take effect and start a new
          shell session after installing pixi, the CUDA toolkit, or Autoware-ML
          bash completion.
