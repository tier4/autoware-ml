name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v6
      - name: Install pixi
        env:
          PIXI_VERSION: 0.66.0
        run: |
          export PIXI_HOME="$HOME/.pixi"
          export PIXI_BIN_DIR="$HOME/.pixi/bin"
          mkdir -p "$PIXI_BIN_DIR"
          case "$(uname -m)" in
            x86_64) PIXI_ARCHIVE="pixi-x86_64-unknown-linux-musl.tar.gz" ;;
            aarch64|arm64) PIXI_ARCHIVE="pixi-aarch64-unknown-linux-musl.tar.gz" ;;
            *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          PIXI_BASE_URL="https://github.com/prefix-dev/pixi/releases/download/v${PIXI_VERSION}"
          curl -fsSLo "/tmp/${PIXI_ARCHIVE}" "${PIXI_BASE_URL}/${PIXI_ARCHIVE}"
          curl -fsSLo "/tmp/${PIXI_ARCHIVE}.sha256" "${PIXI_BASE_URL}/${PIXI_ARCHIVE}.sha256"
          (cd /tmp && sha256sum -c "${PIXI_ARCHIVE}.sha256")
          tar -xzf "/tmp/${PIXI_ARCHIVE}" -C "$PIXI_BIN_DIR" pixi
          chmod +x "$PIXI_BIN_DIR/pixi"
          rm -f "/tmp/${PIXI_ARCHIVE}" "/tmp/${PIXI_ARCHIVE}.sha256"
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
      - name: Install locked docs-only environment
        run: pixi install --locked --environment docs
      - name: Build docs
        run: pixi run --environment docs docs
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
