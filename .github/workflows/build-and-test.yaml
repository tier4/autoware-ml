name: build-and-test

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ghcr.io/tier4/autoware-ml:ci-${{ github.run_id }}
  IMAGE_ARTIFACT_NAME: docker-image-${{ github.run_id }}

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'run:build-and-test' }}
    runs-on: ubuntu-22.04-m
    timeout-minutes: 240

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Save image artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: /tmp/image.tar
          retention-days: 1

  test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'run:build-and-test' }}
    needs: build
    runs-on: ubuntu-22.04-m
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Load image artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}

      - name: Load Docker image
        run: |
          docker load -i image.tar

      - name: Run unit tests
        run: |
          docker run --rm \
            --gpus all \
            ${{ env.IMAGE_TAG }} \
            pytest autoware_ml/tests/ -v
