    _convert_: all
    db_version: db_jpntaxigen2_v2
    max_sweeps: 2
    sample_steps: 1
  - _target_: autoware_ml.databases.scenarios.DatabaseVersion
    _convert_: all
    db_version: db_j6gen2_v1
    max_sweeps: 2
    sample_steps: 1
