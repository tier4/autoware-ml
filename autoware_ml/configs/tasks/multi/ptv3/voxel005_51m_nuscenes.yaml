# @package _global_
defaults:
  - /tasks/multi/ptv3/base
  - /datasets/nuscenes/detection3d
  - /datasets/nuscenes/segmentation3d
  - /datasets/nuscenes/lidar
  - _self_

dataset: ${nuscenes}

batch_size: 16
num_workers: 8

grid_size: 0.05
point_cloud_range: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
head_voxel_size: [0.4, 0.4, 8.0]

num_proposals: 200

segmentation_class_mapping: null

datamodule:
  _target_: autoware_ml.datamodule.nuscenes.segdet.NuscenesSegmentationDetection3DDataModule
  data_root: ${dataset.data_root}
  train_ann_file: nuscenes_infos_train.pkl
  val_ann_file: nuscenes_infos_val.pkl
  test_ann_file: nuscenes_infos_val.pkl
  class_names: ${dataset.detection3d.class_names}
  name_mapping: ${dataset.detection3d.name_mapping}
  lidarseg_dir: lidarseg/v1.0-trainval
  train_frame_sampling: null
  train_dataloader_cfg:
    batch_size: ${batch_size}
    num_workers: ${num_workers}
    shuffle: true
  val_dataloader_cfg:
    batch_size: ${batch_size}
    num_workers: ${num_workers}
  test_dataloader_cfg:
    batch_size: ${batch_size}
    num_workers: ${num_workers}
  train_transforms:
    _target_: autoware_ml.transforms.base.TransformsCompose
    pipeline:
      - _target_: autoware_ml.transforms.boxes3d.loading.LoadAnnotations3D
        name_mapping: ${dataset.detection3d.name_mapping}
      - _target_: autoware_ml.transforms.segmentation3d.loading.LoadSegAnnotations3D
        label_mapping: ${dataset.segmentation3d.seg_label_mapping}
        max_label: ${dataset.segmentation3d.max_label}
        ignore_index: ${dataset.segmentation3d.ignore_index}
      - _target_: autoware_ml.transforms.point_cloud.sweeps.LoadPointsFromMultiSweeps
        sweeps_num: 1
        load_dim: 5
        use_dim: [0, 1, 2, 3]
        remove_close: true
      - _target_: autoware_ml.transforms.point_cloud.formatting.PreparePointCloudInput
      - _target_: autoware_ml.transforms.segmentation3d.formatting.PreparePointSegInput
      - _target_: autoware_ml.transforms.point_cloud.geometry.GlobalRotScaleTrans
        rot_range: [-1.571, 1.571]
        scale_ratio_range: [0.8, 1.2]
        translation_std: [1.0, 1.0, 0.2]
      - _target_: autoware_ml.transforms.point_cloud.geometry.RandomFlip3D
        flip_ratio_bev_horizontal: 0.5
        flip_ratio_bev_vertical: 0.5
      - _target_: autoware_ml.transforms.point_cloud.crop.PointsRangeFilter
        point_cloud_range: ${point_cloud_range}
      - _target_: autoware_ml.transforms.boxes3d.filters.ObjectRangeFilter
        point_cloud_range: ${point_cloud_range}
      - _target_: autoware_ml.transforms.common.copying.Copy
        keys_dict: { segment: origin_segment }
      - _target_: autoware_ml.transforms.point_cloud.sampling.GridSample
        grid_size: ${grid_size}
        point_cloud_range: ${point_cloud_range}
        hash_type: fnv
        mode: train
        keys: [coord, strength, segment]
        return_inverse: true
        return_grid_coord: true
      - _target_: autoware_ml.transforms.common.packing.BuildPointFeatures
        keys: [coord, strength]
        output_key: feat
  val_transforms:
    _target_: autoware_ml.transforms.base.TransformsCompose
    pipeline:
      - _target_: autoware_ml.transforms.boxes3d.loading.LoadAnnotations3D
        name_mapping: ${dataset.detection3d.name_mapping}
      - _target_: autoware_ml.transforms.segmentation3d.loading.LoadSegAnnotations3D
        label_mapping: ${dataset.segmentation3d.seg_label_mapping}
        max_label: ${dataset.segmentation3d.max_label}
        ignore_index: ${dataset.segmentation3d.ignore_index}
      - _target_: autoware_ml.transforms.point_cloud.sweeps.LoadPointsFromMultiSweeps
        sweeps_num: 1
        load_dim: 5
        use_dim: [0, 1, 2, 3]
        remove_close: true
      - _target_: autoware_ml.transforms.point_cloud.formatting.PreparePointCloudInput
      - _target_: autoware_ml.transforms.segmentation3d.formatting.PreparePointSegInput
      - _target_: autoware_ml.transforms.point_cloud.crop.PointsRangeFilter
        point_cloud_range: ${point_cloud_range}
      - _target_: autoware_ml.transforms.common.copying.Copy
        keys_dict: { segment: origin_segment }
      - _target_: autoware_ml.transforms.point_cloud.sampling.GridSample
        grid_size: ${grid_size}
        point_cloud_range: ${point_cloud_range}
        hash_type: fnv
        mode: test
        keys: [coord, strength, segment]
        return_inverse: true
        return_grid_coord: true
      - _target_: autoware_ml.transforms.common.packing.BuildPointFeatures
        keys: [coord, strength]
        output_key: feat
  test_transforms: ${datamodule.val_transforms}
  predict_transforms:
    _target_: autoware_ml.transforms.base.TransformsCompose
    pipeline:
      - _target_: autoware_ml.transforms.point_cloud.sweeps.LoadPointsFromMultiSweeps
        sweeps_num: 1
        load_dim: 5
        use_dim: [0, 1, 2, 3]
        remove_close: true
      - _target_: autoware_ml.transforms.point_cloud.formatting.PreparePointCloudInput
      - _target_: autoware_ml.transforms.point_cloud.crop.PointsRangeFilter
        point_cloud_range: ${point_cloud_range}
      - _target_: autoware_ml.transforms.point_cloud.sampling.GridSample
        grid_size: ${grid_size}
        point_cloud_range: ${point_cloud_range}
        hash_type: fnv
        mode: test
        keys: [coord, strength]
        return_inverse: true
        return_grid_coord: true
      - _target_: autoware_ml.transforms.common.packing.BuildPointFeatures
        keys: [coord, strength]
        output_key: feat

model:
  bev_projector:
    output_shape: [256, 256]
    bev_stride: 8
  bbox_head:
    nms_min_radius: 1.0
    bbox_coder:
      post_center_range: [-61.2, -61.2, -10.0, 61.2, 61.2, 10.0]
