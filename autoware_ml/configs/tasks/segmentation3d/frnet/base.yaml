# @package _global_
defaults:
  - /defaults/default_runtime
  - _self_

dataset: ???

fov_up: ???
fov_down: ???
range_height: ???
range_width: ???
frustum_height: ???
frustum_width: ???

datamodule:
  collation_map:
    points: concat
    pts_semantic_mask: concat
model:
  _target_: autoware_ml.models.segmentation3d.frnet.FRNet
  metrics: ${dataset.segmentation3d.metrics}
  voxel_encoder:
    _target_: autoware_ml.models.segmentation3d.encoders.frnet.FrustumFeatureEncoder
    in_channels: 4
    feat_channels: [64, 128, 256, 256]
    with_distance: true
    with_cluster_center: true
    norm_eps: 0.001
    norm_momentum: 0.01
    with_pre_norm: true
    feat_compression: 16
  backbone:
    _target_: autoware_ml.models.segmentation3d.backbones.frnet.FRNetBackbone
    in_channels: 16
    point_in_channels: 384
    output_shape:
      - ${frustum_height}
      - ${frustum_width}
    depth: 34
    stem_channels: 128
    out_channels: [128, 128, 128, 128]
    strides: [1, 2, 2, 2]
    dilations: [1, 1, 1, 1]
    fuse_channels: [256, 128]
    norm_eps: 0.001
    norm_momentum: 0.01
  decode_head:
    _target_: autoware_ml.models.segmentation3d.heads.frnet.FRHead
    in_channels: 128
    middle_channels: [128, 256, 128, 64]
    num_classes: ${dataset.segmentation3d.num_classes}
    ignore_index: ${dataset.segmentation3d.ignore_index}
    loss_ce_weight: 1.0
    norm_eps: 0.001
    norm_momentum: 0.01
  auxiliary_head:
    - _target_: autoware_ml.models.segmentation3d.heads.frnet.FrustumHead
      channels: 128
      num_classes: ${dataset.segmentation3d.num_classes}
      ignore_index: ${dataset.segmentation3d.ignore_index}
      feature_index: 1
      loss_ce_weight: 1.0
      loss_lovasz_weight: 1.5
      loss_boundary_weight: 1.0
    - _target_: autoware_ml.models.segmentation3d.heads.frnet.FrustumHead
      channels: 128
      num_classes: ${dataset.segmentation3d.num_classes}
      ignore_index: ${dataset.segmentation3d.ignore_index}
      feature_index: 2
      loss_ce_weight: 1.0
      loss_lovasz_weight: 1.5
      loss_boundary_weight: 1.0
    - _target_: autoware_ml.models.segmentation3d.heads.frnet.FrustumHead
      channels: 128
      num_classes: ${dataset.segmentation3d.num_classes}
      ignore_index: ${dataset.segmentation3d.ignore_index}
      feature_index: 3
      loss_ce_weight: 1.0
      loss_lovasz_weight: 1.5
      loss_boundary_weight: 1.0
    - _target_: autoware_ml.models.segmentation3d.heads.frnet.FrustumHead
      channels: 128
      num_classes: ${dataset.segmentation3d.num_classes}
      ignore_index: ${dataset.segmentation3d.ignore_index}
      feature_index: 4
      loss_ce_weight: 1.0
      loss_lovasz_weight: 1.5
      loss_boundary_weight: 1.0
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.01
    betas: [0.9, 0.999]
    weight_decay: 0.01
    eps: 1.0e-6
  scheduler:
    _target_: torch.optim.lr_scheduler.OneCycleLR
    _partial_: true
    total_steps: ${trainer.max_steps}
    max_lr: ${model.optimizer.lr}
    pct_start: 0.2
    div_factor: 25.0
    final_div_factor: 100.0
  scheduler_config:
    interval: step

trainer:
  max_epochs: -1
  max_steps: 150000
  val_check_interval: 1500
  check_val_every_n_epoch: null

callbacks:
  model_checkpoint:
    monitor: val/loss
    mode: min
    every_n_train_steps: 1500
    save_on_train_epoch_end: false
  early_stopping: null

deploy:
  onnx:
    dynamo: false
    opset_version: 16
    modules:
      end_to_end:
        output_names: [pred_probs]
        dynamic_axes:
          points: { 0: num_points }
          coors: { 0: num_points }
          voxel_coors: { 0: num_unique_coors }
          inverse_map: { 0: num_points }
          pred_probs: { 0: num_points }
        dynamic_shapes:
          points: { 0: { name: num_points, min: 2 } }
          coors: { 0: { name: num_points, min: 2 } }
          voxel_coors: { 0: { name: num_unique_coors, min: 2 } }
          inverse_map: { 0: { name: num_points, min: 2 } }
  tensorrt:
    input_shapes:
      points:
        min_shape: [5000, 4]
        opt_shape: [60000, 4]
        max_shape: [160000, 4]
      coors:
        min_shape: [5000, 3]
        opt_shape: [60000, 3]
        max_shape: [160000, 3]
      voxel_coors:
        min_shape: [3000, 3]
        opt_shape: [30000, 3]
        max_shape: [60000, 3]
      inverse_map:
        min_shape: [5000]
        opt_shape: [60000]
        max_shape: [160000]

data_preprocessing:
  pipeline:
    - _target_: autoware_ml.preprocessing.segmentation3d.frustum_range.FrustumRangePreprocessor
      height: ${frustum_height}
      width: ${frustum_width}
      fov_up: ${fov_up}
      fov_down: ${fov_down}
      ignore_index: ${dataset.segmentation3d.ignore_index}
      num_classes: ${dataset.segmentation3d.num_classes}
