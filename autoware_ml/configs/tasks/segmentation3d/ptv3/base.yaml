# @package _global_
defaults:
  - /defaults/default_runtime
  - /tasks/segmentation3d/ptv3/backbone_base
  - _self_

datamodule:
  collation_map:
    coord: concat
    grid_coord: concat
    strength: concat
    segment: concat
    inverse: index_concat
    origin_segment: concat
    origin_coord: concat
    feat: concat
  train_dataloader_cfg:
    batch_size: 8
    num_workers: 16
    shuffle: true
    drop_last: true
  val_dataloader_cfg:
    batch_size: 8
    num_workers: 16
  test_dataloader_cfg:
    batch_size: 1
    num_workers: 1
  predict_dataloader_cfg:
    batch_size: 1
    num_workers: 1
  train_transforms:
    _target_: autoware_ml.transforms.base.TransformsCompose
    pipeline: []
  val_transforms:
    _target_: autoware_ml.transforms.base.TransformsCompose
    pipeline: []
  test_transforms:
    _target_: autoware_ml.transforms.base.TransformsCompose
    pipeline: []
  predict_transforms:
    _target_: autoware_ml.transforms.base.TransformsCompose
    pipeline: []

model:
  _target_: autoware_ml.models.segmentation3d.ptv3.PTv3SegmentationModel
  num_classes: ${num_classes}
  backbone_out_channels: 64
  ignore_index: ${ignore_index}
  metrics:
    - _target_: autoware_ml.metrics.segmentation3d.suite.Segmentation3DMetricSuite
      num_classes: ${num_classes}
      ignore_index: ${ignore_index}
      class_names: ${seg_class_names:${oc.select:class_mapping, null}, ${num_classes}}
      ranges:
        - _target_: autoware_ml.metrics.base.MetricRange
          name: 0-50m
          min_distance: 0.0
          max_distance: 50.0
        - _target_: autoware_ml.metrics.base.MetricRange
          name: 50-90m
          min_distance: 50.0
          max_distance: 90.0
        - _target_: autoware_ml.metrics.base.MetricRange
          name: 90-121m
          min_distance: 90.0
          max_distance: 121.0
        - _target_: autoware_ml.metrics.base.MetricRange
          name: 0-121m
          min_distance: 0.0
          max_distance: 121.0
      components:
        - { _target_: autoware_ml.metrics.segmentation3d.iou.IoU, stages: [val, test] }
        - { _target_: autoware_ml.metrics.segmentation3d.accuracy.Accuracy, stages: [val, test] }
        - { _target_: autoware_ml.metrics.segmentation3d.precision_recall_f1.PrecisionRecallF1, stages: [val, test] }
  grid_size: ${grid_size}
  point_cloud_range: ${point_cloud_range}
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.002
    weight_decay: 0.005
  optimizer_group_overrides:
    block:
      lr: 0.0002
  scheduler:
    _target_: torch.optim.lr_scheduler.OneCycleLR
    _partial_: true
    max_lr: [0.002, 0.0002]
    pct_start: 0.04
    anneal_strategy: cos
    div_factor: 10.0
    final_div_factor: 100.0
  scheduler_config:
    interval: step
  lovasz_weight: 1.0

trainer:
  max_epochs: 50
  gradient_clip_val: 10.0

callbacks:
  model_checkpoint:
    monitor: val/loss
    mode: min
  early_stopping:
    monitor: val/loss
    patience: 20
    mode: min

deploy:
  onnx:
    enabled: true
    opset_version: 17
    dynamo: false
    do_constant_folding: false
    modules:
      backbone:
        output_names: [point_feat, point_grid_coord, point_offset]
      seg3d_head:
        output_names: [pred_labels, pred_probs]
  tensorrt:
    enabled: false
