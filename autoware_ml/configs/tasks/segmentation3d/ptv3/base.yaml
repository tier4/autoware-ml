# @package _global_
defaults:
  - /defaults/default_runtime
  - /tasks/segmentation3d/ptv3/encoder_base
  - /tasks/segmentation3d/ptv3/seg_head_base
  - _self_

dataset: ???

grid_size: ???
point_cloud_range: ???

datamodule:
  collation_map:
    coord: concat
    grid_coord: concat
    segment: concat
    inverse: index_concat
    origin_segment: concat
    origin_coord: concat
    feat: concat

model:
  _target_: autoware_ml.models.segmentation3d.ptv3.PTv3SegmentationModel
  metrics: ${dataset.segmentation3d.metrics}
  grid_size: ${grid_size}
  point_cloud_range: ${point_cloud_range}
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.002
    weight_decay: 0.005
  optimizer_group_overrides:
    block:
      lr: 0.0002
  scheduler:
    _target_: torch.optim.lr_scheduler.OneCycleLR
    _partial_: true
    max_lr: [0.002, 0.0002]
    pct_start: 0.04
    anneal_strategy: cos
    div_factor: 10.0
    final_div_factor: 100.0
  scheduler_config:
    interval: step

trainer:
  max_epochs: 50
  gradient_clip_val: 10.0

callbacks:
  model_checkpoint:
    monitor: val/loss
    mode: min
  early_stopping:
    monitor: val/loss
    patience: 20
    mode: min

deploy:
  onnx:
    enabled: true
    opset_version: 17
    dynamo: false
    do_constant_folding: false
    modules:
      encoder:
        output_names: [point_feat_0, point_feat_1, point_feat_2, point_feat_3, point_feat_4]
      seg3d_head:
        output_names: [pred_labels, pred_probs]
  tensorrt:
    enabled: false
